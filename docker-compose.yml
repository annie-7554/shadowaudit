services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shadowaudit
      POSTGRES_USER: shadowaudit
      POSTGRES_PASSWORD: shadowaudit
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadowaudit -d shadowaudit"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  bff:
    build:
      context: .
      dockerfile: packages/bff/Dockerfile
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: shadowaudit
      POSTGRES_USER: shadowaudit
      POSTGRES_PASSWORD: shadowaudit
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  scanner:
    build:
      context: .
      dockerfile: packages/scanner/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: shadowaudit
      POSTGRES_USER: shadowaudit
      POSTGRES_PASSWORD: shadowaudit
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bff:
        condition: service_healthy

  notifier:
    build:
      context: .
      dockerfile: packages/notifier/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: shadowaudit
      POSTGRES_USER: shadowaudit
      POSTGRES_PASSWORD: shadowaudit
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: http://localhost:9999/webhook
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - bff

volumes:
  postgres_data:
  redis_data:
