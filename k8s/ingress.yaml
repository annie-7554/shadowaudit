apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadowaudit-ingress
  namespace: vulnwatch
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - shadowaudit.example.com
      secretName: shadowaudit-tls
  rules:
    - host: shadowaudit.example.com
      http:
        paths:
          # Route root to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shadowaudit-frontend
                port:
                  number: 80
          # Route /api to BFF
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shadowaudit-bff
                port:
                  number: 80
